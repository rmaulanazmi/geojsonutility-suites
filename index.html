          const terms = rawTerminals.filter(t => t.Element_ID === eId).map(t => { const termGraphics = {}; rawGraphicTerminals.filter(gt => gt.Terminal_ID === t.Terminal_ID).forEach(gt => { termGraphics[String(gt.GraphicArea_ID)] = { x: gt.PosX, y: gt.PosY }; }); return { terminal_id: t.Terminal_ID, node_id: t.Node_ID, terminal_no: t.TerminalNo, graphics: termGraphics }; });

          const graphics = {}; rawGraphicLines.filter(gl => gl.Element_ID === eId).forEach(gl => { graphics[String(gl.GraphicArea_ID)] = { graphicLineId: gl.GraphicLine_ID, bucklePoints: [] }; });
          if (rawBucklePoints.length > 0 && rawBucklePoints[0].Element_ID !== undefined) {
            rawBucklePoints.filter(bp => bp.Element_ID === eId).forEach(bp => { const areaId = String(bp.GraphicArea_ID); if (!graphics[areaId]) graphics[areaId] = { bucklePoints: [] }; if (bp.BuckleX !== undefined && bp.BuckleX !== null) graphics[areaId].bucklePoints.push({ seqNo: graphics[areaId].bucklePoints.length + 1, posX: bp.BuckleX, posY: bp.BuckleY }); });
          }

          let det = {};
          if (e.Type === "Line") { const match = linesList.find(l => l.Element_ID === eId); if (match) det = { l: match.l, lineTyp: match.LineTyp || "DefaultConductor", q: match.q, r: match.r, x: match.x, c: match.c, Ith: match.Ith, lineInfo: match.LineInfo, parSys: match.ParSys || 1, Flag_LineTyp: match.Flag_LineTyp || 1 }; } 
          else if (e.Type === "TwoWindingTransformer") { const match = trafosList.find(t => t.Element_ID === eId); if (match) det = { sn: match.Sn, uk: match.uk, vfe: match.Vfe, pvlk: match.Pvlk, i0: match.i0, vecGrp: match.VecGrp, un1: match.Un1, un2: match.Un2 }; } 
          else if (e.Type === "Load") { const match = loadsList.find(l => l.Element_ID === eId); if (match) det = { p: match.P, q: match.Q, s: match.S, cosphi: match.cosphi, i: match.I, Flag_LoadType: match.Flag_LoadType || 2 }; } 
          else if (e.Type === "Infeeder") { const match = infeederList.find(i => i.Element_ID === eId); if (match) det = { sk2max: match.Sk2max, sk2min: match.Sk2min, r_x: match.R_X, r_xmin: match.R_Xmin, u: match.u, delta: match.delta }; } 
          else if (e.Type === "AsynchronousMachine") { const match = asyncList.find(a => a.Element_ID === eId); if (match) det = { Flag_Typ: match.Flag_Typ, Pn: match.Pn, Inm: match.Inm, Un: match.Un, speedn: match.speedn, pol: match.pol, cosphin: match.cosphin, etan: match.etan, Ia_In: match.Ia_In, Flag_Nema: match.Flag_Nema, Slip: match.Slip }; } 
          else if (e.Type === "SynchronousMachine") { const match = syncList.find(s => s.Element_ID === eId); if (match) det = { Flag_Machine: match.Flag_Machine, Sn: match.Sn, Un: match.Un, cosphin: match.cosphin, Flag_Lf: match.Flag_Lf, P: match.P, Q: match.Q, cosphi: match.cosphi, Ug: match.Ug, u: match.u }; }
          else if (e.Type === "DCInfeeder") { const match = convertersList.find(c => c.Element_ID === eId); if (match) det = { Flag_DCtyp: match.Flag_DCtyp, Sn_Inverter: match.Sn_Inverter, Ur_Inverter: match.Ur_Inverter, Umin_Inverter: match.Umin_Inverter, Umax_Inverter: match.Umax_Inverter, P: match.P, Q: match.Q, cosphi: match.cosphi, S: match.S }; }
          else if (e.Type === "Switch") { const match = switchesList.find(s => s.Element_ID === eId); if (match) det = { Flag_Type: match.Flag_Type, Flag_State: match.Flag_State, Ith: match.Ith, kA: match.kA, tkr: match.tkr, Ipmax: match.Ipmax, Iamax: match.Iamax }; }
          else if (e.Type === "ShuntCondensator") { const match = shuntList.find(c => c.Element_ID === eId); if (match) det = { Sn: match.Sn, Vdi: match.Vdi, Un: match.Un, Ci: match.Ci, Flag_roh: match.Flag_roh, ull: match.ull, uul: match.uul, CosPhi_min: match.CosPhi_min, CosPhi_max: match.CosPhi_max, Q_min: match.Q_min, Q_max: match.Q_max, Node_ID: match.Node_ID, Terminal_ID: match.Terminal_ID }; }

          let lf = null;
          if (terms.length > 0) {
            const tids = terms.map(t => t.terminal_id); const branchMatch = rawLfBranches.find(b => tids.includes(b.Terminal1_ID) || tids.includes(b.Terminal2_ID));
            if (branchMatch) lf = { p: branchMatch.P, q: branchMatch.Q, s: branchMatch.S, i: branchMatch.I, s_sn: branchMatch.S_Sn, pl: branchMatch.Pl, du: branchMatch.dU, flagState: branchMatch.Flag_State || 1, cos_phi: branchMatch.cos_phi };
          }
          return { id: eId, name: e.Name || `${e.Type}_${eId}`, type: e.Type, variantId: e.Variant_ID || 1, terms, det, lf, graphics };
        });

        return { variants: parsedVars, nodes, elements, views: views.length > 0 ? views : [{ id: 2, name: "Primary Substation SLD", flag: 2 }] };
      };

      const executeWASMQueryOnConsole = (db, query) => {
        setSqlRunning(true); setSqlError(""); setSqlOutput(null);
        setTimeout(() => {
          try {
            const res = db.exec(query);
            if (res.length === 0) setSqlOutput({ columns: ["Status"], rows: [["Success. No rows returned."]] });
            else setSqlOutput({ columns: res[0].columns, rows: res[0].values });
            setSqlResultsOpen(true);
          } catch (err) { setSqlError(err.message); } finally { setSqlRunning(false); }
        }, 200);
      };

      const executeSandboxQuery = () => {
        if (activeDB) { executeWASMQueryOnConsole(activeDB, sqlInput); } 
        else {
          setSqlRunning(true);
          setTimeout(() => {
            const text = sqlInput.toLowerCase();
            if (text.includes("node")) setSqlOutput({ columns: ["Node_ID", "Name", "Un (kV)", "Ik2 (kA)", "tkr (s)", "Ip (kA)", "Iamax (kA)"], rows: (gridData?.nodes || []).map(n => [n.id, n.name, n.un, n.ik2 || "NULL", n.tkr || "NULL", n.ip || "NULL", n.iamax || "NULL"]) });
            else if (text.includes("lfbranchresult") || text.includes("line")) setSqlOutput({ columns: ["Element_ID", "Active Power (MW)", "Reactive Power (Mvar)", "Current (kA)", "Loading Ratio S_Sn (%)", "Pl (MW)", "dU (kV)", "Flag_State"], rows: (gridData?.elements || []).filter(e => e.lf).map(e => [ e.id, Math.abs(e.lf.p || 0), Math.abs(e.lf.q || 0), Math.abs(e.lf.i || 0), e.lf.s_sn || 0, e.lf.pl || 0, e.lf.du || 0, e.lf.flagState || 1 ]) });
            else setSqlOutput({ columns: ["Result"], rows: [["Query execution accomplished. Sandbox online. No rows returned."]] });
            setSqlRunning(false); setSqlResultsOpen(true);
          }, 150);
        }
      };

      const assetDirectoryGroups = useMemo(() => {
        if (!gridData) return { busbars: [], lines: [], transformers: [], infeeders: [], loads: [], async: [], sync: [], converters: [], switches: [], capacitors: [] };
        const query = searchQuery.toLowerCase().trim();
        return { 
          busbars: gridData.nodes.filter(n => !query || n.name.toLowerCase().includes(query) || String(n.un).includes(query) || String(n.id).includes(query)), 
          lines: gridData.elements.filter(e => e.type === "Line").filter(e => !query || e.name.toLowerCase().includes(query) || (e.det?.lineTyp && e.det.lineTyp.toLowerCase().includes(query)) || String(e.id).includes(query)), 
          transformers: gridData.elements.filter(e => e.type === "TwoWindingTransformer").filter(e => !query || e.name.toLowerCase().includes(query) || String(e.id).includes(query)), 
          infeeders: gridData.elements.filter(e => e.type === "Infeeder").filter(e => !query || e.name.toLowerCase().includes(query) || String(e.id).includes(query)), 
          loads: gridData.elements.filter(e => e.type === "Load").filter(e => !query || e.name.toLowerCase().includes(query) || String(e.id).includes(query)), 
          async: gridData.elements.filter(e => e.type === "AsynchronousMachine").filter(e => !query || e.name.toLowerCase().includes(query) || String(e.id).includes(query)), 
          sync: gridData.elements.filter(e => e.type === "SynchronousMachine").filter(e => !query || e.name.toLowerCase().includes(query) || String(e.id).includes(query)),
          converters: gridData.elements.filter(e => e.type === "DCInfeeder").filter(e => !query || e.name.toLowerCase().includes(query) || String(e.id).includes(query)),
          switches: gridData.elements.filter(e => e.type === "Switch").filter(e => !query || e.name.toLowerCase().includes(query) || String(e.id).includes(query)),
          capacitors: gridData.elements.filter(e => e.type === "ShuntCondensator").filter(e => !query || e.name.toLowerCase().includes(query) || String(e.id).includes(query))
        };
      }, [gridData, searchQuery]);

      useEffect(() => {
        if (searchQuery.trim().length > 0) {
          const autoExpand = {};
          if (assetDirectoryGroups.busbars.length > 0) autoExpand.busbars = true;
          if (assetDirectoryGroups.lines.length > 0) autoExpand.lines = true;
          if (assetDirectoryGroups.transformers.length > 0) autoExpand.transformers = true;
          if (assetDirectoryGroups.infeeders.length > 0) autoExpand.infeeders = true;
          if (assetDirectoryGroups.loads.length > 0) autoExpand.loads = true;
          if (assetDirectoryGroups.async.length > 0) autoExpand.async = true;
          if (assetDirectoryGroups.sync.length > 0) autoExpand.sync = true;
          if (assetDirectoryGroups.converters.length > 0) autoExpand.converters = true;
          if (assetDirectoryGroups.switches.length > 0) autoExpand.switches = true;
          if (assetDirectoryGroups.capacitors.length > 0) autoExpand.capacitors = true;
          setCollapsedCategories(prev => ({ ...prev, ...autoExpand }));
        }
      }, [searchQuery, assetDirectoryGroups]);

      const toggleCategory = (cat) => setCollapsedCategories(prev => ({ ...prev, [cat]: !prev[cat] }));

      const renderVoltageGauge = (u_un, flagState) => {
        const val = u_un || 100.0; const width = Math.min(100, Math.max(0, val));
        let colorClass = "bg-emerald-500";
        if (flagState === 3 || val < 95.0) colorClass = "bg-cyan-400"; else if (flagState === 4 || val > 105.0) colorClass = "bg-rose-500 animate-pulse"; else if (flagState === 2) colorClass = "bg-amber-500";
        return (
          <div className="mt-3 bg-slate-950 p-3 rounded-lg border border-slate-800 space-y-1.5">
            <div className="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-wider"><span>Voltage Ratio Gauge</span><span className="text-white font-mono">{val.toFixed(2)} %</span></div>
            <div className="relative w-full h-3 bg-slate-900 rounded-full overflow-hidden border border-slate-800"><div className={`h-full ${colorClass} transition-all duration-300`} style={{ width: `${width}%` }} /></div>
            <div className="flex justify-between text-4xs text-slate-505 font-mono"><span>Min (95%)</span><span>Nominal (100%)</span><span>Max (105%)</span></div>
          </div>
        );
      };

      const renderLoadingGauge = (loading, flagState) => {
        const val = loading || 0.0; const width = Math.min(100, val);

      const renderDirectionBadge = (powerVal) => {
        if (powerVal === undefined || powerVal === null) return null; const isPositive = powerVal >= 0;
        return (

          </span>

      const totalActivePower = useMemo(() => { if (!topWidgetsData) return 0; return (topWidgetsData.Pgen || 0) + (topWidgetsData.Pslack || 0); }, [topWidgetsData]);
      const totalReactivePower = useMemo(() => { if (!topWidgetsData) return 0; return (topWidgetsData.Qgen || 0) + (topWidgetsData.Qslack || 0); }, [topWidgetsData]);
      const efficiencyValue = useMemo(() => { if (!topWidgetsData || totalActivePower === 0) return 0; return ((topWidgetsData.Pload || 0) / totalActivePower) * 100; }, [topWidgetsData, totalActivePower]);

      const efficiencyTheme = useMemo(() => {
        if (efficiencyValue >= 98) return { text: "text-emerald-400", bg: "bg-emerald-500/10", border: "border-emerald-500/20", indicator: "bg-emerald-500", label: "Ultra-High Efficiency" };
        else if (efficiencyValue >= 90) return { text: "text-teal-400", bg: "bg-teal-500/10", border: "border-teal-500/20", indicator: "bg-teal-500", label: "Optimal Range" };
        else if (efficiencyValue >= 80) return { text: "text-amber-500", bg: "bg-amber-500/10", border: "border-amber-500/20", indicator: "bg-amber-500", label: "Moderate Losses" };
        else return { text: "text-rose-500", bg: "bg-rose-500/10", border: "border-rose-500/20", indicator: "bg-rose-500", label: "High Loss Warning" };
      }, [efficiencyValue]);

      const currencyLabel = useMemo(() => {
        if (currencySymbol === "CUSTOM") return customCurrencyText; return { USD: "$", EUR: "€", GBP: "£", JPY: "¥", IDR: "Rp" }[currencySymbol] || "$";
      }, [currencySymbol, customCurrencyText]);

      return (
        <div className="flex flex-col h-screen text-slate-100 bg-slate-950 select-none overflow-hidden relative">
          
          <header className="flex flex-col border-b border-slate-800 bg-slate-900/40 backdrop-blur-md shrink-0 z-30">
            <div className="flex items-center justify-between px-6 py-2 border-b border-slate-800">
              <div className="flex items-center gap-3">
                <div className="bg-indigo-600 text-white p-2 rounded-lg flex items-center justify-center"><Icon name="activity" className="w-5 h-5" /></div>
                <div>
                  <h1 className="text-sm font-extrabold flex items-center gap-2">PSS®SINCAL Topology Web Explorer</h1>
                  <p className="text-3xs text-slate-400 flex items-center gap-2 font-mono">
                    <span className="font-semibold text-indigo-400 truncate max-w-[200px]">{dbFileName || "No SINCAL Database loaded"}</span>
                    <span className="w-1 h-1 rounded-full bg-slate-700"></span><span>Nodes: {dbStats.nodes}</span>
                    <span className="w-1 h-1 rounded-full bg-slate-700"></span><span>Elements: {dbStats.elements}</span>
                  </p>
                </div>
              </div>

              <div className="flex items-center gap-3">
                {gridData && (
                  <div className="relative" ref={variantDropdownRef}>
                    <button onClick={() => setVariantDropdownOpen(!variantDropdownOpen)} className="bg-slate-900 border border-slate-800 rounded-lg px-2.5 py-1 text-xs text-white font-semibold flex items-center gap-2 hover:border-indigo-500/50 hover:bg-slate-850 transition-all focus:outline-none">
                      <Icon name="folder-tree" className="w-3.5 h-3.5 text-indigo-400" />
                      <span>Variant: <strong className="text-indigo-400">{variantsList.find(v => v.id === activeVariantId)?.name || "Base Case"}</strong></span>
                      <Icon name="chevron-down" className="w-3.5 h-3.5 text-slate-400" />
                    </button>
                    {variantDropdownOpen && (
                      <div className="absolute right-0 mt-1.5 w-64 bg-slate-900 border border-slate-800 rounded-xl shadow-2xl z-[5000] p-1.5 space-y-1">

                </div>

          <div className="bg-slate-900/25 border-b border-slate-800 px-6 py-3.5 shrink-0">
            {topWidgetsData ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                <div className="bg-slate-900/60 border border-slate-800 p-3.5 rounded-xl space-y-2 flex flex-col justify-between">
                  <div>
                    <div className="flex items-center justify-between text-[10px] font-bold text-indigo-400 uppercase tracking-wider pb-1 border-b border-slate-800/60"><span>System Generation</span></div>
                    <div className="grid grid-cols-2 gap-x-3 gap-y-2 text-2xs mt-2">
                      <div><div className="text-slate-400 font-semibold">Gen Active</div><div className="text-white font-mono font-bold">{formatAdaptivePower(topWidgetsData.Pgen, "W").full}</div></div>
                      <div><div className="text-slate-400 font-semibold">Gen Reactive</div><div className="text-white font-mono font-bold">{formatAdaptivePower(topWidgetsData.Qgen, "var").full}</div></div>
                      <div><div className="text-slate-400 font-semibold">Slack Active</div><div className="text-white font-mono font-bold">{formatAdaptivePower(topWidgetsData.Pslack, "W").full}</div></div>
                      <div><div className="text-slate-400 font-semibold">Slack Reactive</div><div className="text-white font-mono font-bold">{formatAdaptivePower(topWidgetsData.Qslack, "var").full}</div></div>

                  <div className="pt-2 border-t border-slate-800/40 grid grid-cols-2 gap-2">
                    <div><div className="text-4xs font-bold text-indigo-300 uppercase">Total P</div><div className="text-xs font-black text-indigo-400 font-mono">{formatAdaptivePower(totalActivePower, "W").full}</div></div>
                    <div><div className="text-4xs font-bold text-indigo-300 uppercase">Total Q</div><div className="text-xs font-black text-indigo-400 font-mono">{formatAdaptivePower(totalReactivePower, "var").full}</div></div>
                  </div>
                </div>

                <div className="bg-slate-900/60 border border-slate-800 p-3.5 rounded-xl space-y-2 flex flex-col justify-between">
                  <div>
                    <div className="flex items-center justify-between text-[10px] font-bold text-pink-400 uppercase tracking-wider pb-1 border-b border-slate-800/60"><span>Total System Load</span></div>
                    <div className="grid grid-cols-2 gap-4 mt-3 text-2xs">
                      <div><div className="text-slate-400 font-semibold">Active Load</div><div className="text-sm font-black text-white font-mono pt-1">{formatAdaptivePower(topWidgetsData.Pload, "W").full}</div></div>
                      <div><div className="text-slate-400 font-semibold">Reactive Load</div><div className="text-sm font-black text-white font-mono pt-1">{formatAdaptivePower(topWidgetsData.Qload, "var").full}</div></div>
                    </div>
                  </div>
                </div>

                <div className="bg-slate-900/60 border border-slate-800 p-3.5 rounded-xl space-y-2 flex flex-col justify-between">
                  <div>
                    <div className="flex items-center justify-between text-[10px] font-bold text-amber-500 uppercase tracking-wider pb-1 border-b border-slate-800/60"><span>Total System Losses</span></div>
                    <div className="grid grid-cols-2 gap-2 mt-2 text-2xs">
                      <div><div className="text-slate-400 font-semibold">Active Losses</div><div className="text-xs font-extrabold text-white font-mono">{formatAdaptivePower(topWidgetsData.Psum, "W").full}</div></div>
                      <div><div className="text-slate-400 font-semibold">Reactive Losses</div><div className="text-xs font-extrabold text-white font-mono">{formatAdaptivePower(topWidgetsData.Qsum, "var").full}</div></div>
                    </div>
                  </div>
                  <div className="pt-2 border-t border-slate-800/40 flex flex-wrap items-center justify-between text-[8.5px] text-slate-400 font-mono gap-1">

                          <div className="flex justify-between"><span className="text-slate-400">Rated Voltage:</span><span className="text-white font-mono">{selectedElement.det.Un !== undefined ? `${selectedElement.det.Un} kV` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Speed:</span><span className="text-white font-mono">{selectedElement.det.speedn !== undefined ? `${selectedElement.det.speedn} rpm` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Pole Pairs:</span><span className="text-white font-mono">{selectedElement.det.pol}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Cosphi:</span><span className="text-white font-mono">{selectedElement.det.cosphin}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Efficiency:</span><span className="text-white font-mono">{selectedElement.det.etan} pu</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Start-Up Ratio (Ia/In):</span><span className="text-white font-mono">{selectedElement.det.Ia_In} pu</span></div>
                          <div className="flex justify-between"><span className="text-slate-455">NEMA Type:</span><span className="text-white font-bold">{decodeNemaType(selectedElement.det.Flag_Nema)}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Slip:</span><span className="text-white font-mono">{selectedElement.det.Slip !== undefined ? `${selectedElement.det.Slip} %` : '-'}</span></div>
                        </React.Fragment>
                      )}

                      {selectedElement.type === "SynchronousMachine" && selectedElement.det && (
                        <React.Fragment>
                          <div className="flex justify-between"><span className="text-slate-400">Type of Machine:</span><span className="text-white font-mono">{selectedElement.det.Flag_Machine}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Apparent Power:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.det.Sn, "VA").full}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Voltage:</span><span className="text-white font-mono">{selectedElement.det.Un !== undefined ? `${selectedElement.det.Un} kV` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Cosphi:</span><span className="text-white font-mono">{selectedElement.det.cosphin}</span></div>
                          <div className="flex justify-between items-start gap-2 border-t border-slate-800/60 pt-1.5 mt-1.5"><span className="text-slate-455 whitespace-nowrap">Operating Mode:</span><span className="text-white font-bold text-right leading-tight">{decodeSyncOperatingMode(selectedElement.det.Flag_Lf)}</span></div>
                          <div className="flex justify-between border-t border-slate-800/60 pt-1.5 mt-1.5"><span className="text-slate-400">Setpoint P:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.det.P, "W").full}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Setpoint Q:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.det.Q, "var").full}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Power Factor:</span><span className="text-white font-mono">{selectedElement.det.cosphi}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Setpoint Volt (Abs):</span><span className="text-white font-mono">{selectedElement.det.Ug !== undefined ? `${selectedElement.det.Ug} kV` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Setpoint Volt (%):</span><span className="text-white font-mono">{selectedElement.det.u !== undefined ? `${selectedElement.det.u} %` : '-'}</span></div>
                        </React.Fragment>
                      )}

                      {selectedElement.type === "DCInfeeder" && selectedElement.det && (
                        <React.Fragment>
                          <div className="flex justify-between"><span className="text-slate-400">Plant Type:</span><span className="text-white font-bold">{decodeConverterType(selectedElement.det.Flag_DCtyp)}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Apparent Power:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.det.Sn_Inverter, "VA").full}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Voltage:</span><span className="text-white font-mono">{selectedElement.det.Ur_Inverter !== undefined ? `${selectedElement.det.Ur_Inverter} kV` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Minimum Voltage:</span><span className="text-white font-mono">{selectedElement.det.Umin_Inverter !== undefined ? `${selectedElement.det.Umin_Inverter} %` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Maximum Voltage:</span><span className="text-white font-mono">{selectedElement.det.Umax_Inverter !== undefined ? `${selectedElement.det.Umax_Inverter} %` : '-'}</span></div>
                          <div className="flex justify-between border-t border-slate-800/60 pt-1.5 mt-1.5"><span className="text-slate-400">Active Power:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.det.P, "W").full}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Reactive Power:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.det.Q, "var").full}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Apparent Power:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.det.S, "VA").full}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Power Factor:</span><span className="text-white font-mono">{selectedElement.det.cosphi}</span></div>
                        </React.Fragment>
                      )}

                      {/* NEW: Switch Info Section */}
                      {selectedElement.type === "Switch" && selectedElement.det && (
                        <React.Fragment>
                          <div className="flex justify-between"><span className="text-slate-400">Switch Type:</span><span className="text-white font-bold">{decodeSwitchType(selectedElement.det.Flag_Type)}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Switch State:</span>
                            <span className={`text-[9px] px-1 py-0.5 rounded uppercase font-bold border ${selectedElement.det.Flag_State === 0 ? 'text-rose-400 border-rose-500/30 bg-rose-500/10' : 'text-teal-400 border-teal-500/30 bg-teal-500/10'}`}>
                              {decodeSwitchState(selectedElement.det.Flag_State)}
                            </span>
                          </div>
                          <div className="flex justify-between border-t border-slate-800/60 pt-1.5 mt-1.5"><span className="text-slate-400">Thermal Limit:</span><span className="text-white font-semibold font-mono">{selectedElement.det.Ith !== undefined ? `${selectedElement.det.Ith} kA` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Max SC Current:</span><span className="text-white font-mono">{selectedElement.det.kA !== undefined ? `${selectedElement.det.kA} kA` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Short Time:</span><span className="text-white font-mono">{selectedElement.det.tkr !== undefined ? `${selectedElement.det.tkr} s` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Max Peak Current:</span><span className="text-white font-mono">{selectedElement.det.Ipmax !== undefined ? `${selectedElement.det.Ipmax} kA` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Max Breaking Curr:</span><span className="text-white font-mono">{selectedElement.det.Iamax !== undefined ? `${selectedElement.det.Iamax} kA` : '-'}</span></div>
                        </React.Fragment>
                      )}

                      {/* NEW: Shunt Capacitor Info Section */}
                      {selectedElement.type === "ShuntCondensator" && selectedElement.det && (
                        <React.Fragment>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Capacity:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.det.Sn, "var").full}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Rated Voltage:</span><span className="text-white font-mono">{selectedElement.det.Un !== undefined ? `${selectedElement.det.Un} kV` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Dielectric Losses:</span><span className="text-white font-mono">{selectedElement.det.Vdi !== undefined ? `${selectedElement.det.Vdi} kW` : '-'}</span></div>
                          <div className="flex justify-between"><span className="text-slate-400">Acquisition Cost:</span><span className="text-white font-mono">{selectedElement.det.Ci !== undefined ? `${currencyLabel}${selectedElement.det.Ci.toLocaleString()}` : '-'}</span></div>
                          
                          <div className="border-t border-slate-800/60 pt-1.5 mt-1.5 space-y-1.5">
                            <div className="flex justify-between"><span className="text-slate-455">Control Mode:</span><span className="text-white font-bold">{decodeShuntControlMode(selectedElement.det.Flag_roh)}</span></div>
                            
                            {[2].includes(selectedElement.det.Flag_roh) && (
                              <React.Fragment>
                                <div className="flex justify-between"><span className="text-slate-400">Setpoint V (Min):</span><span className="text-white font-mono">{selectedElement.det.ull !== undefined ? `${selectedElement.det.ull} %` : '-'}</span></div>
                                <div className="flex justify-between"><span className="text-slate-400">Setpoint V (Max):</span><span className="text-white font-mono">{selectedElement.det.uul !== undefined ? `${selectedElement.det.uul} %` : '-'}</span></div>
                              </React.Fragment>
                            )}

                            {[3].includes(selectedElement.det.Flag_roh) && (
                              <React.Fragment>
                                <div className="flex justify-between"><span className="text-slate-400">Setpoint cosphi (Min):</span><span className="text-white font-mono">{selectedElement.det.CosPhi_min !== undefined ? selectedElement.det.CosPhi_min : '-'}</span></div>
                                <div className="flex justify-between"><span className="text-slate-400">Setpoint cosphi (Max):</span><span className="text-white font-mono">{selectedElement.det.CosPhi_max !== undefined ? selectedElement.det.CosPhi_max : '-'}</span></div>
                              </React.Fragment>
                            )}

                            {[4, 5, 6, 7].includes(selectedElement.det.Flag_roh) && (
                              <React.Fragment>
                                <div className="flex justify-between"><span className="text-slate-400">Setpoint Q (Min):</span><span className="text-white font-mono">{selectedElement.det.Q_min !== undefined ? `${selectedElement.det.Q_min} Mvar` : '-'}</span></div>
                                <div className="flex justify-between"><span className="text-slate-400">Setpoint Q (Max):</span><span className="text-white font-mono">{selectedElement.det.Q_max !== undefined ? `${selectedElement.det.Q_max} Mvar` : '-'}</span></div>
                              </React.Fragment>
                            )}

                            {[2, 4, 5, 6].includes(selectedElement.det.Flag_roh) && (
                              <div className="flex justify-between"><span className="text-slate-400">Controlled Node:</span><span className="text-white font-mono text-[9px] truncate max-w-[120px]" title={gridData.nodes.find(n => n.id === selectedElement.det.Node_ID)?.name || `ID: ${selectedElement.det.Node_ID}`}>{gridData.nodes.find(n => n.id === selectedElement.det.Node_ID)?.name || `ID: ${selectedElement.det.Node_ID}`}</span></div>
                            )}

                            {[3, 7].includes(selectedElement.det.Flag_roh) && (
                              <div className="flex justify-between"><span className="text-slate-400">Controlled Terminal:</span>
                                {(() => {
                                  const termElem = gridData.elements.find(e => e.terms.some(t => t.terminal_id === selectedElement.det.Terminal_ID));
                                  return termElem ? <span className="text-white font-mono text-[9px] truncate max-w-[120px]" title={termElem.name}>{termElem.name}</span> : <span className="text-slate-500 italic text-[9px]">No Controlled Terminal</span>;
                                })()}
                              </div>
                            )}
                          </div>
                        </React.Fragment>
                      )}

                    </div>
                  </div>

                  {selectedElement.lf && (
                    <div className="bg-slate-900/60 border border-slate-800 p-3.5 rounded-xl space-y-2.5">
                      <div className="flex justify-between items-center pb-1 border-b border-slate-800">
                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>Calculated Load Flow</h4>
                      </div>
                      <div className="space-y-1.5 text-2xs">
                        {selectedElement.coords && (
                          <React.Fragment>
                            <div className="flex justify-between"><span className="text-slate-400">Actual Voltage:</span><span className="text-white font-semibold font-mono">{selectedElement.lf.u.toFixed(2)} kV</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Voltage Ratio:</span><span className="text-white font-semibold font-mono">{selectedElement.lf.u_un.toFixed(2)} %</span></div>
                            {renderVoltageGauge(selectedElement.lf.u_un, selectedElement.lf.flagState)}
                          </React.Fragment>
                        )}

                        {selectedElement.type === "Line" && (
                          <React.Fragment>
                            <div className="flex justify-between"><span className="text-slate-400">Active Power:</span><span className="text-white font-semibold font-mono flex items-center">{formatAdaptivePower(selectedElement.lf.p, "W").full} {renderDirectionBadge(selectedElement.lf.p)}</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Reactive Power:</span><span className="text-white font-semibold font-mono flex items-center">{formatAdaptivePower(selectedElement.lf.q, "var").full} {renderDirectionBadge(selectedElement.lf.q)}</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Apparent Power:</span><span className="text-white font-semibold font-mono">{formatAdaptivePower(selectedElement.lf.s, "VA").full}</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Current:</span><span className="text-white font-semibold font-mono">{(selectedElement.lf.i * 1000).toFixed(2)} A</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Loading (S/Sn):</span><span className="text-white font-semibold font-mono">{selectedElement.lf.s_sn.toFixed(2)} %</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Active Losses (Pl):</span><span className="text-white font-mono">{formatAdaptivePower(selectedElement.lf.pl, "W").full}</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Voltage Drop (dU):</span><span className="text-white font-mono">{selectedElement.lf.du.toFixed(2)} %</span></div>
                            {renderLoadingGauge(selectedElement.lf.s_sn, selectedElement.lf.flagState)}
                          </React.Fragment>
                        )}

                        {selectedElement.type === "TwoWindingTransformer" && (
                          <React.Fragment>
                            <div className="flex justify-between"><span className="text-slate-400">Active Power:</span><span className="text-white font-semibold font-mono flex items-center">{formatAdaptivePower(selectedElement.lf.p, "W").full} {renderDirectionBadge(selectedElement.lf.p)}</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Reactive Power:</span><span className="text-white font-semibold font-mono flex items-center">{formatAdaptivePower(selectedElement.lf.q, "var").full} {renderDirectionBadge(selectedElement.lf.q)}</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Loading (S/Sn):</span><span className="text-white font-semibold font-mono">{selectedElement.lf.s_sn.toFixed(2)} %</span></div>
                            {renderLoadingGauge(selectedElement.lf.s_sn, selectedElement.lf.flagState)}
                          </React.Fragment>
                        )}

                        {/* NEW: Shunt Capacitor Load Flow Info Section */}
                        {selectedElement.type === "ShuntCondensator" && (
                          <React.Fragment>
                            <div className="flex justify-between"><span className="text-slate-400">Active Power (Loss):</span><span className="text-white font-semibold font-mono flex items-center">{formatAdaptivePower(selectedElement.lf.p, "W").full} {renderDirectionBadge(selectedElement.lf.p)}</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Reactive Power:</span><span className="text-white font-semibold font-mono flex items-center">{formatAdaptivePower(selectedElement.lf.q, "var").full} {renderDirectionBadge(selectedElement.lf.q)}</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Operating Current:</span><span className="text-white font-semibold font-mono">{(selectedElement.lf.i * 1000).toFixed(2)} A</span></div>
                            <div className="flex justify-between"><span className="text-slate-400">Loading (S/Sn):</span><span className="text-white font-semibold font-mono">{selectedElement.lf.s_sn.toFixed(2)} %</span></div>
                            {renderLoadingGauge(selectedElement.lf.s_sn, selectedElement.lf.flagState)}
                          </React.Fragment>
                        )}

                      </div>
                    </div>
                  )}

                </div>
              ) : (
                <div className="flex-1 flex flex-col items-center justify-center p-6 border border-dashed border-slate-800 rounded-xl text-center text-slate-505 text-2xs mt-4">
                  <Icon name="mouse-pointer" className="w-8 h-8 opacity-25 mb-2 text-indigo-400" />
                  <span className="font-semibold text-slate-400">No element selected</span>
                  <span className="text-4xs text-slate-505 mt-1 max-w-xs">Click on any busbar node or branch lines inside Schematic or GIS maps to inspect property vectors.</span>
                </div>
              )}
            </aside>
          </div>

          {subnetworkDrawerOpen && (
            <div className="absolute inset-0 z-[6000] flex justify-end">
              <div className="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onClick={() => setSubnetworkDrawerOpen(false)}></div>
              <div className="relative w-80 sm:w-96 bg-slate-900 border-l border-slate-800 h-full shadow-2xl flex flex-col animate-[slideIn_0.3s_ease-out]">
                <div className="flex items-center justify-between p-4 border-b border-slate-800 bg-slate-950/80 shrink-0">
                  <h3 className="text-xs font-black text-amber-500 uppercase tracking-wider flex items-center gap-2"><Icon name="activity" className="w-4 h-4" />Subnetwork Results</h3>
                  <button onClick={() => setSubnetworkDrawerOpen(false)} className="text-slate-400 hover:text-white font-bold text-lg leading-none p-1 focus:outline-none" title="Close">&times;</button>
                </div>
                
                <div className="flex-1 overflow-y-auto p-5 space-y-6">
                  <div className="space-y-3">
                    <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5">Losses by Voltage Level</h4>
                    {subnetworkLevelLosses && subnetworkLevelLosses.length > 0 ? (
                      <div className="space-y-2.5">
                        {subnetworkLevelLosses.map((lvl, i) => (
                          <div key={i} className="bg-slate-950/50 border border-slate-800 p-3.5 rounded-xl flex flex-col gap-2">
                            <span className="text-xs font-bold text-indigo-400">{lvl.level}</span>
                            <div className="grid grid-cols-2 gap-2">
                              <div className="bg-slate-900 p-2 rounded border border-slate-850"><span className="block text-[9px] text-slate-500 uppercase font-bold mb-0.5">Active (P)</span><span className="font-mono text-xs text-white font-bold">{formatAdaptivePower(lvl.psum, "W").full}</span></div>
                              <div className="bg-slate-900 p-2 rounded border border-slate-850"><span className="block text-[9px] text-slate-500 uppercase font-bold mb-0.5">Reactive (Q)</span><span className="font-mono text-xs text-white font-bold">{formatAdaptivePower(lvl.qsum, "var").full}</span></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (<div className="text-xs text-slate-600 italic text-center py-4 border border-dashed border-slate-800 rounded-lg">No voltage level loss data available.</div>)}
                  </div>

                  <div className="space-y-3">
                    <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5">Losses by Network Group</h4>
                    {subnetworkAreaLosses && subnetworkAreaLosses.length > 0 ? (
                      <div className="space-y-2.5">
                        {subnetworkAreaLosses.map((grp, i) => (
                          <div key={i} className="bg-slate-950/50 border border-slate-800 p-3.5 rounded-xl flex flex-col gap-2">
                            <span className="text-xs font-bold text-emerald-400 truncate" title={grp.areaName}>{grp.areaName}</span>
                            <div className="grid grid-cols-2 gap-2">
                              <div className="bg-slate-900 p-2 rounded border border-slate-850"><span className="block text-[9px] text-slate-500 uppercase font-bold mb-0.5">Active (P)</span><span className="font-mono text-xs text-white font-bold">{formatAdaptivePower(grp.p_loss_tot, "W").full}</span></div>
                              <div className="bg-slate-900 p-2 rounded border border-slate-850"><span className="block text-[9px] text-slate-500 uppercase font-bold mb-0.5">Reactive (Q)</span><span className="font-mono text-xs text-white font-bold">{formatAdaptivePower(grp.q_loss_tot, "var").full}</span></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (<div className="text-xs text-slate-600 italic text-center py-4 border border-dashed border-slate-800 rounded-lg">No area group loss data available.</div>)}
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
